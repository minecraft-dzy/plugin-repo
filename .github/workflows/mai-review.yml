name: Mai Review Plugin Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  mai-review:
    if: >-
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.actor != 'github-actions[bot]' &&
       github.event.label.name == 'validated' &&
       (contains(github.event.issue.labels.*.name, 'plugin-submission') ||
        contains(github.event.issue.labels.*.name, 'plugin-modification') ||
        contains(github.event.issue.labels.*.name, 'plugin-removal'))) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'plugin-submission') &&
       contains(github.event.issue.labels.*.name, 'validated') &&
       contains(github.event.comment.body, '/mai_review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check reviewer permission
        id: check-permission
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commenter,
            });

            const allowedPermissions = ['admin', 'write'];
            if (!allowedPermissions.includes(permission.permission)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ @${commenter} 只有 **仓库维护者** (admin/write) 可以使用 \`/mai_review\` 命令。`,
              });
              core.setFailed(`用户 @${commenter} 没有权限使用 /mai_review`);
              return;
            }

            core.setOutput('commenter', commenter);

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Ark credentials
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: |
          if [ -z "$ARK_API_KEY" ]; then
            echo "缺少 ARK_API_KEY secret" >&2
            exit 1
          fi

      - name: Validate GitHub App credentials
        env:
          MAI_REVIEW_APP_ID: ${{ secrets.MAI_REVIEW_APP_ID }}
          MAI_REVIEW_APP_PRIVATE_KEY: ${{ secrets.MAI_REVIEW_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$MAI_REVIEW_APP_ID" ]; then
            echo "缺少 MAI_REVIEW_APP_ID secret" >&2
            exit 1
          fi

          if [ -z "$MAI_REVIEW_APP_PRIVATE_KEY" ]; then
            echo "缺少 MAI_REVIEW_APP_PRIVATE_KEY secret" >&2
            exit 1
          fi

      - name: Build review context
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node .github/scripts/build_mai_review_context.js

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Write Codex config
        env:
          ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/plan/v3
          ARK_MODEL: ${{ vars.MAI_REVIEW_MODEL }}
        run: |
          mkdir -p "$HOME/.codex"
          MODEL_NAME="${ARK_MODEL:-ark-code-latest}"
          cat > "$HOME/.codex/config.toml" <<EOF
          model = "${MODEL_NAME}"
          model_provider = "ark"
          model_reasoning_summary = "none"
          model_supports_reasoning_summaries = false

          [model_providers.ark]
          name = "Volcengine Ark Agent Plan"
          base_url = "${ARK_BASE_URL}"
          env_key = "ARK_API_KEY"
          wire_api = "responses"
          request_max_retries = 4
          stream_max_retries = 5
          stream_idle_timeout_ms = 300000
          EOF

      - name: Run Codex review
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: |
          PROMPT="$(cat .github/codex/prompts/plugin-issue-review.md)"
          codex exec \
            --sandbox danger-full-access \
            --output-last-message codex-review.md \
            "$PROMPT"

      - name: Run Codex Mai comment
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: |
          PROMPT="$(cat .github/codex/prompts/plugin-issue-maimai-comment.md)"
          codex exec \
            --sandbox danger-full-access \
            --output-last-message codex-maimai.md \
            "$PROMPT"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MAI_REVIEW_APP_ID }}
          private-key: ${{ secrets.MAI_REVIEW_APP_PRIVATE_KEY }}

      - name: Post review comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const sanitize = (text) =>
              text
                .replace(/\/approve\b/gi, '"approve"')
                .replace(/\/recheck\b/gi, '"recheck"')
                .replace(/\/reject\b/gi, '"reject"');

            const review = sanitize(fs.readFileSync('codex-review.md', 'utf8').trim());
            const maimai = sanitize(fs.readFileSync('codex-maimai.md', 'utf8').trim());
            if (!review) {
              core.setFailed('codex-review.md 为空，无法发表评论');
              return;
            }
            if (!maimai) {
              core.setFailed('codex-maimai.md 为空，无法发表评论');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- codex-mai-review -->\n${review}\n${maimai}`,
            });
