name: Generate Plugin Details

on:
  push:
    branches:
      - main
    paths:
      - 'plugins.json'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-details:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install icon processor
        run: npm install --no-save --no-package-lock sharp@0.33.5

      - name: Generate plugin details
        run: |
          node <<'EOL'
          const fs = require('fs');
          const https = require('https');
          const path = require('path');
          const sharp = require('sharp');

          const BRANCHES = ['main', 'master', 'dev', 'develop'];
          const ICON_DIR = 'icons';
          const ICON_SIZE = 64;
          const REQUEST_TIMEOUT_MS = 10000;
          const MAX_ICON_BYTES = 2 * 1024 * 1024;
          const LOCAL_ICON_SUFFIXES = new Set(['.jpg', '.jpeg', '.png', '.svg', '.webp']);

          async function main() {
            try {
              fs.mkdirSync(ICON_DIR, { recursive: true });
              const plugins = JSON.parse(fs.readFileSync('plugins.json', 'utf8'));
              console.log(`在 plugins.json 中找到 ${plugins.length} 个插件`);

              // 跳过第一个插件
              const pluginsToProcess = plugins.slice(1);
              console.log(`准备处理 ${pluginsToProcess.length} 个插件（跳过第一个）`);

              const pluginDetails = [];
              const iconPaths = new Set();
              const errors = [];
              const warnings = [];

              for (const plugin of pluginsToProcess) {
                try {
                  console.log(`\n=== 正在获取插件清单：${plugin.id} ===`);
                  console.log(`仓库地址：${plugin.repositoryUrl}`);
                  const manifestResult = await fetchManifest(plugin.repositoryUrl);
                  const detail = {
                    id: plugin.id,
                    manifest: manifestResult.manifest
                  };

                  try {
                    const iconPath = await syncPluginIcon(plugin, manifestResult);
                    if (iconPath) {
                      detail.assets = {
                        icon_64: iconPath
                      };
                      iconPaths.add(iconPath);
                    }
                  } catch (iconError) {
                    const cachedIconPath = buildIconOutputPath(plugin.id);
                    let warning = `插件 ${plugin.id} 图标同步失败：${iconError.message}`;
                    if (fs.existsSync(buildIconOutputFsPath(plugin.id))) {
                      detail.assets = {
                        icon_64: cachedIconPath
                      };
                      iconPaths.add(cachedIconPath);
                      warning += '，已保留已有缓存';
                    }
                    warnings.push(warning);
                    console.warn(`⚠️ ${warning}`);
                  }

                  pluginDetails.push(detail);

                  console.log(`✅ 成功处理插件：${plugin.id}`);
                } catch (error) {
                  const errorMsg = `插件 ${plugin.id} 处理失败：${error.message}`;
                  console.error(`❌ ${errorMsg}`);
                  errors.push(errorMsg);
                  // 继续处理其他插件，不中断整个流程
                }
              }

              cleanupStaleIcons(iconPaths);

              // 写入 plugin_details.json 文件
              fs.writeFileSync('plugin_details.json', JSON.stringify(pluginDetails, null, 2) + '\n');
              console.log(`\n✅ 生成 plugin_details.json 文件，包含 ${pluginDetails.length} 个插件`);

              if (warnings.length > 0) {
                console.warn(`\n⚠️  图标同步过程中发现 ${warnings.length} 个警告：`);
                warnings.forEach((warning, index) => {
                  console.warn(`${index + 1}. ${warning}`);
                });
              }

              // 报告错误统计
              if (errors.length > 0) {
                console.warn(`\n⚠️  处理过程中发现 ${errors.length} 个错误：`);
                errors.forEach((error, index) => {
                  console.warn(`${index + 1}. ${error}`);
                });
                console.warn(`\n成功率：${pluginDetails.length}/${pluginsToProcess.length} (${Math.round(pluginDetails.length / pluginsToProcess.length * 100)}%)`);
              } else {
                console.log(`\n🎉 所有插件处理成功！`);
              }

            } catch (error) {
              console.error(`❌ 处理失败：${error.message}`);
              process.exit(1);
            }
          }

          function fetchManifest(repoUrl) {
            async function tryFetchFromBranch(branch) {
              const rawUrl = repoUrl.replace('github.com', 'raw.githubusercontent.com') + `/refs/heads/${branch}/_manifest.json`;
              console.log(`尝试从 ${branch} 分支获取清单文件：${rawUrl}`);
              
              return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                  reject(new Error(`获取清单文件超时（10秒）：${rawUrl}`));
                }, 10000);

                const req = https.get(rawUrl, res => {
                  clearTimeout(timeout);
                  
                  if (res.statusCode !== 200) {
                    return reject(new Error(`状态码：${res.statusCode}`));
                  }
                  
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    try {
                      const manifest = JSON.parse(data);
                      resolve({ manifest, branch, url: rawUrl });
                    } catch (parseError) {
                      reject(new Error(`JSON 解析失败：${parseError.message}`));
                    }
                  });
                  res.on('error', err => {
                    clearTimeout(timeout);
                    reject(new Error(`读取响应数据时出错：${err.message}`));
                  });
                });

                req.on('error', err => {
                  clearTimeout(timeout);
                  reject(new Error(`网络错误：${err.message}`));
                });

                req.setTimeout(10000, () => {
                  req.destroy();
                  reject(new Error(`请求超时`));
                });
              });
            }

            // Try each branch until one succeeds
            return (async () => {
              const errors = [];
              
              for (const branch of BRANCHES) {
                try {
                  const result = await tryFetchFromBranch(branch);
                  console.log(`✅ 成功从 ${result.branch} 分支获取到清单文件`);
                  return result;
                } catch (error) {
                  errors.push(`${branch} 分支: ${error.message}`);
                  console.log(`❌ ${branch} 分支获取失败: ${error.message}`);
                }
              }
              
              // If all branches failed, throw a comprehensive error
              throw new Error(`无法从任何分支获取 _manifest.json 文件。尝试的分支：${BRANCHES.join(', ')}。错误详情：\n${errors.map((err, i) => `${i + 1}. ${err}`).join('\n')}。\n\n请检查：\n1. 文件名是否为 '_manifest.json'（注意下划线）\n2. 仓库是否为公开仓库\n3. 文件是否存在于上述分支中\n仓库地址：${repoUrl}`);
            })();
          }

          async function syncPluginIcon(plugin, manifestResult) {
            const icon = manifestResult.manifest?.display?.icon;
            if (!icon || icon.type !== 'local') {
              return null;
            }

            const iconPath = normalizeLocalIconPath(icon.value);
            const rawIconUrl = buildRawFileUrl(plugin.repositoryUrl, manifestResult.branch, iconPath);
            const outputPath = buildIconOutputPath(plugin.id);
            const outputFsPath = buildIconOutputFsPath(plugin.id);

            console.log(`尝试同步插件图标：${rawIconUrl}`);
            const sourceBuffer = await fetchBinary(rawIconUrl, MAX_ICON_BYTES);
            await sharp(sourceBuffer, { limitInputPixels: 16_000_000 })
              .resize(ICON_SIZE, ICON_SIZE, {
                fit: 'contain',
                background: { r: 0, g: 0, b: 0, alpha: 0 }
              })
              .webp({ quality: 80, effort: 4 })
              .toFile(outputFsPath);

            console.log(`✅ 已生成插件图标：${outputPath}`);
            return outputPath;
          }

          function normalizeLocalIconPath(value) {
            if (typeof value !== 'string' || !value.trim()) {
              throw new Error('local 图标路径为空');
            }

            const normalized = value.trim().replace(/\\/g, '/');
            if (normalized.startsWith('/') || normalized.includes('\0')) {
              throw new Error('local 图标路径必须是插件目录内的相对路径');
            }

            const parts = normalized.split('/').filter(part => part && part !== '.');
            if (parts.length === 0 || parts.some(part => part === '..')) {
              throw new Error('local 图标路径不能包含上级目录');
            }

            const suffix = path.posix.extname(parts.at(-1)).toLowerCase();
            if (!LOCAL_ICON_SUFFIXES.has(suffix)) {
              throw new Error('local 图标仅支持 jpg、jpeg、png、svg、webp');
            }

            return parts.join('/');
          }

          function buildRawFileUrl(repoUrl, branch, filePath) {
            const normalizedRepoUrl = repoUrl.replace(/\/+$/, '').replace(/\.git$/, '');
            const encodedPath = filePath.split('/').map(part => encodeURIComponent(part)).join('/');
            return normalizedRepoUrl.replace('github.com', 'raw.githubusercontent.com') + `/refs/heads/${branch}/${encodedPath}`;
          }

          function safeIconFileBase(pluginId) {
            return String(pluginId || 'unknown').replace(/[^A-Za-z0-9_.-]/g, '_');
          }

          function buildIconOutputPath(pluginId) {
            return path.posix.join(ICON_DIR, `${safeIconFileBase(pluginId)}.webp`);
          }

          function buildIconOutputFsPath(pluginId) {
            return path.join(ICON_DIR, `${safeIconFileBase(pluginId)}.webp`);
          }

          function fetchBinary(url, maxBytes, redirectCount = 0) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, res => {
                if ([301, 302, 303, 307, 308].includes(res.statusCode) && res.headers.location) {
                  res.resume();
                  if (redirectCount >= 3) {
                    reject(new Error('图标下载重定向次数过多'));
                    return;
                  }
                  resolve(fetchBinary(new URL(res.headers.location, url).toString(), maxBytes, redirectCount + 1));
                  return;
                }

                if (res.statusCode !== 200) {
                  res.resume();
                  reject(new Error(`图标下载失败，状态码：${res.statusCode}`));
                  return;
                }

                const chunks = [];
                let receivedBytes = 0;

                res.on('data', chunk => {
                  receivedBytes += chunk.length;
                  if (receivedBytes > maxBytes) {
                    req.destroy(new Error(`图标文件超过 ${Math.round(maxBytes / 1024 / 1024)}MB 限制`));
                    return;
                  }
                  chunks.push(chunk);
                });

                res.on('end', () => {
                  resolve(Buffer.concat(chunks));
                });
              });

              req.on('error', err => {
                reject(err);
              });

              req.setTimeout(REQUEST_TIMEOUT_MS, () => {
                req.destroy(new Error(`请求超时（${REQUEST_TIMEOUT_MS / 1000}秒）：${url}`));
              });
            });
          }

          function cleanupStaleIcons(activeIconPaths) {
            if (!fs.existsSync(ICON_DIR)) {
              return;
            }

            for (const entry of fs.readdirSync(ICON_DIR, { withFileTypes: true })) {
              if (!entry.isFile() || !entry.name.endsWith('.webp')) {
                continue;
              }

              const relativePath = path.posix.join(ICON_DIR, entry.name);
              if (activeIconPaths.has(relativePath)) {
                continue;
              }

              fs.rmSync(path.join(ICON_DIR, entry.name));
              console.log(`已清理失效插件图标：${relativePath}`);
            }
          }

          main();
          EOL

      - name: Commit and push plugin details
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add plugin_details.json icons
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
          else
            git commit -m "自动生成 plugin_details.json 和图标缓存"
            git push
            echo "✅ 已提交并推送 plugin_details.json 和图标缓存更新"
          fi
